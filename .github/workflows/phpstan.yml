name: phpstan

permissions:
  contents: read

on:
  push:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - '.github/workflows/phpstan.yml'
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - '.github/workflows/phpstan.yml'

concurrency:
  group: phpstan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: laravel-x402
    steps:
      - uses: actions/checkout@v6
        with:
          path: laravel-x402

      - name: Checkout sandermuller/php-x402
        uses: actions/checkout@v6
        with:
          repository: SanderMuller/php-x402
          path: php-x402

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4
        with:
          working-directory: laravel-x402

      - name: Cache PHPStan results
        uses: actions/cache@v5
        with:
          path: laravel-x402/.cache/phpstan/
          key: phpstan-result-cache-${{ hashFiles('laravel-x402/composer.lock', 'laravel-x402/phpstan.neon.dist') }}
          restore-keys: phpstan-result-cache-

      - name: Run PHPStan
        run: ./vendor/bin/phpstan --error-format=github --no-interaction --memory-limit=2G
