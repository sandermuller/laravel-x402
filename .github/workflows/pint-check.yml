name: pint-check

on:
  pull_request:
    paths:
      - '**.php'
      - 'pint.json'
      - '.github/workflows/pint-check.yml'

permissions:
  contents: read

concurrency:
  group: pint-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: laravel-x402

    steps:
      - uses: actions/checkout@v6
        with:
          path: laravel-x402

      - name: Checkout sandermuller/php-x402
        uses: actions/checkout@v6
        with:
          repository: SanderMuller/php-x402
          path: php-x402

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4
        with:
          working-directory: laravel-x402

      - name: Cache Pint results
        uses: actions/cache@v5
        with:
          path: laravel-x402/.cache/pint/
          key: pint-cache-${{ hashFiles('laravel-x402/pint.json') }}
          restore-keys: pint-cache-

      - name: Run Pint (test)
        run: vendor/bin/pint --test
