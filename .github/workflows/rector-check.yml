name: rector-check

on:
  pull_request:
    paths:
      - '**.php'
      - 'rector.php'
      - '.github/workflows/rector-check.yml'

permissions:
  contents: read

concurrency:
  group: rector-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rector-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: laravel-x402

    steps:
      - uses: actions/checkout@v6
        with:
          path: laravel-x402

      - name: Checkout sandermuller/php-x402
        uses: actions/checkout@v6
        with:
          repository: SanderMuller/php-x402
          path: php-x402

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4
        with:
          working-directory: laravel-x402

      - name: Cache Rector results
        uses: actions/cache@v5
        with:
          path: |
            laravel-x402/.cache/rector/
            laravel-x402/.cache/rectorContainer/
          key: rector-cache-${{ hashFiles('laravel-x402/rector.php') }}
          restore-keys: rector-cache-

      - name: Ensure Rector cache directories exist
        run: mkdir -p .cache/rector .cache/rectorContainer

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run
